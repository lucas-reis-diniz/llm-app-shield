name: 🛡️ LLM Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  llm-security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jinja2 pathspec pyyaml

      - name: Run LLM Security Scan
        run: python3 tools/llmshield.py . --fail-on high --json scan-report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llm-security-report
          path: scan-report.json
