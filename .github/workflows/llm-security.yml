# .github/workflows/llm-security.yml
# ─────────────────────────────────────────────────────────────────────────────
# LLMAppShield — GitHub Actions Security Scan Workflow
#
# Copy this file into YOUR repository to automatically scan for LLM
# security vulnerabilities on every push and pull request.
#
# Usage:
#   1. Copy to .github/workflows/llm-security.yml in your repo
#   2. (Optional) Set LLMAPPSHIELD_FAIL_ON secret to "high" or "critical"
#   3. Push and watch the scan run!
# ─────────────────────────────────────────────────────────────────────────────
name: 🛡️ LLM Security Scan

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly scan every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"

jobs:
  llm-security-scan:
    name: LLMAppShield Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For GitHub Security tab integration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install LLMAppShield
        run: pip install llmapp-shield

      - name: Run LLM Security Scan
        id: scan
        run: |
          llmapp-shield scan . \
            --format all \
            --output llmshield-report.html \
            --severity low \
            --fail-on ${{ vars.LLMAPPSHIELD_FAIL_ON || 'high' }} \
            --lang pt-BR \
            --no-banner
        continue-on-error: true

      - name: Check scan exit code
        if: steps.scan.outcome == 'failure'
        run: |
          echo "::error::🚨 LLMAppShield found HIGH or CRITICAL vulnerabilities!"
          echo "::error::Review the security report artifact for details."
          exit 1

      - name: Upload HTML Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llm-security-report-${{ github.run_number }}
          path: |
            llmshield-report.html
            llmshield-report.json
          retention-days: 90

      - name: Comment PR with summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '## 🛡️ LLMAppShield Security Scan\n\n';

            try {
              const report = JSON.parse(fs.readFileSync('llmshield-report.json', 'utf8'));
              const s = report.summary;
              summary += `| Severity | Count |\n|---|---|\n`;
              summary += `| 🔴 Critical | ${s.critical} |\n`;
              summary += `| 🟠 High | ${s.high} |\n`;
              summary += `| 🟡 Medium | ${s.medium} |\n`;
              summary += `| 🔵 Low | ${s.low} |\n`;
              summary += `\n**Total:** ${s.total} findings in ${report.meta.scanned_files} files\n\n`;
              if (s.critical > 0 || s.high > 0) {
                summary += `> ⚠️ **Action Required:** Critical/High vulnerabilities found. Review the security report before merging.\n`;
              } else if (s.total === 0) {
                summary += `> ✅ No vulnerabilities found!\n`;
              } else {
                summary += `> 💡 Review the security report for recommendations.\n`;
              }
            } catch (e) {
              summary += '> Unable to parse report. Check the CI logs.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
