# .github/workflows/ci.yml
name: CI — Lint, Test & Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run Ruff (linter)
        run: ruff check llmapp_shield/ tests/

      - name: Run Ruff (formatter check)
        run: ruff format --check llmapp_shield/ tests/

      - name: Run MyPy (type checker)
        run: mypy llmapp_shield/ --ignore-missing-imports

  # ─── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=llmapp_shield \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─── Security Scan (dogfooding — we scan ourselves!) ───────────────────────
  llm-security-scan:
    name: 🛡️ LLM Security Scan (Dogfood)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install LLMAppShield
        run: pip install -e .

      - name: Scan project with LLMAppShield
        run: |
          llmapp-shield scan . \
            --format all \
            --output llmshield-report.html \
            --severity medium \
            --no-banner
        continue-on-error: true  # Don't fail CI during bootstrap

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: llmshield-security-report
          path: |
            llmshield-report.html
            llmshield-report.json
          retention-days: 30

  # ─── Example: Scan a third-party project (in PR context) ──────────────────
  scan-pr-changes:
    name: 🔐 Scan PR Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install LLMAppShield
        run: pip install -e .

      - name: Scan changed Python/TS files
        run: |
          # Get changed files in PR
          git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -E '\.(py|ts|js)$' \
            | head -50 > changed_files.txt

          if [ -s changed_files.txt ]; then
            echo "Scanning changed files:"
            cat changed_files.txt
            while IFS= read -r file; do
              if [ -f "$file" ]; then
                llmapp-shield scan "$file" --fail-on critical --format json \
                  --output "scan-${file//\//-}.json" --no-banner || exit 1
              fi
            done < changed_files.txt
          else
            echo "No Python/TypeScript files changed."
          fi

      - name: Upload per-file reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-security-scans
          path: scan-*.json
